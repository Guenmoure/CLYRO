services:
  # ───────────────────────────────────────────────────────────────────────
  # clyro-api — serveur Express (HTTP uniquement)
  #
  # Les pipelines lourdes (storyboard Claude, images fal.ai, voix ElevenLabs,
  # assemblage FFmpeg, render Remotion) ne doivent PAS tourner ici : elles
  # bloqueraient l'event loop et feraient timeout /health. Elles sont
  # enfilées dans BullMQ et consommées par le service `clyro-worker`.
  # ───────────────────────────────────────────────────────────────────────
  - type: web
    name: clyro-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: standard         # 2 GB RAM / 1 CPU — marge pour Express + burst
    region: frankfurt      # EU pour la latence Afrique/Europe
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000          # aligné avec Dockerfile EXPOSE + HEALTHCHECK

      # — Redis (BullMQ) —
      # URL du service Redis (Render Key-Value, Upstash, etc.). Dès qu'elle
      # est définie, les routes pipeline poussent les jobs dans la queue
      # au lieu de les exécuter inline.
      - key: REDIS_URL
        sync: false

      # — Supabase —
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # — AI services —
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_DEFAULT_VOICE_ID
        sync: false
      - key: FAL_KEY
        sync: false

      # — Stripe —
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_STUDIO
        sync: false

      # — Moneroo Mobile Money —
      - key: MONEROO_API_KEY
        sync: false
      - key: MONEROO_WEBHOOK_SECRET
        sync: false
      - key: MONEROO_SIGNATURE_HEADER
        sync: false        # nom exact du header de signature (voir doc Moneroo)

      # — Resend emails —
      - key: RESEND_API_KEY
        sync: false

      # — HeyGen (F5 AI Avatar Studio) —
      - key: HEYGEN_API_KEY
        sync: false        # key depuis https://app.heygen.com/settings/api
      - key: HEYGEN_WEBHOOK_SECRET
        sync: false        # shared secret HeyGen pour la vérif HMAC des webhooks

      # — F5 Studio pipeline (optionnel, a des valeurs par défaut) —
      - key: PIPELINE_TIMEOUT_MS
        sync: false        # watchdog du pipeline — défaut 1800000 (30 min)

      # — Fallback inline —
      # Si 'true' et aucun worker disponible, les pipelines s'exécutent dans
      # le process API (ancien comportement — peut faire timeout /health sur
      # les gros assemblages, mais l'app reste fonctionnelle).
      #
      # ⚠️  TEMPORAIRE : laissé à 'true' tant que Redis + clyro-worker ne
      # sont pas configurés en prod (voir RENDER_WORKER_SETUP.md).
      # Une fois le worker opérationnel : flipper à 'false' pour fail-fast
      # 503 si le worker tombe (au lieu de retomber sur l'inline et risquer
      # un timeout /health).
      - key: ALLOW_INLINE_FALLBACK
        value: 'true'

      # — URLs (remplir après déploiement Vercel) —
      - key: FRONTEND_URL
        sync: false        # ex: https://app.clyro.app
      - key: BACKEND_URL
        sync: false        # ex: https://api.clyro.app (URL Render)

  # ───────────────────────────────────────────────────────────────────────
  # clyro-worker — consommateur BullMQ dédié
  #
  # Reçoit les jobs (faceless, motion, render) via Redis et les exécute
  # hors du process HTTP. Aucun port exposé : c'est un "background worker".
  # Même image Docker que clyro-api, juste une commande différente.
  #
  # Les variables d'environnement doivent être synchronisées manuellement
  # avec clyro-api pour les clés AI/Supabase/Stripe (Render ne copie pas
  # automatiquement). REDIS_URL doit pointer sur la même instance que l'API.
  # ───────────────────────────────────────────────────────────────────────
  - type: worker
    name: clyro-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    # IMPORTANT : le WORKDIR du conteneur est /app et le Dockerfile copie
    # les fichiers à /app/apps/api/dist (voir apps/api/Dockerfile:97 et
    # le CMD par défaut ligne 113 : "node apps/api/dist/index.js").
    # Sans le préfixe "apps/api/", le worker crashe avec MODULE_NOT_FOUND.
    dockerCommand: node apps/api/dist/workers/renderWorker.js
    plan: standard         # 2 GB RAM / 1 CPU — pour FFmpeg + Remotion
    region: frankfurt
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # Force Node à utiliser la heap maximale du plan (2 GB = 2048 MB).
      # Sans ça, V8 plafonne par défaut vers 1.5 GB et déclenche un OOM
      # quand la pipeline faceless accumule buffers MP3/MP4 + FFmpeg.
      # `--expose-gc` permet aux pipelines d'appeler global.gc() après
      # l'assemblage pour libérer la mémoire avant le job suivant.
      - key: NODE_OPTIONS
        value: '--max-old-space-size=1800 --expose-gc'

      # — Redis (obligatoire — sans ça, le worker ne démarre pas) —
      - key: REDIS_URL
        sync: false

      # — Supabase —
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # — AI services —
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_DEFAULT_VOICE_ID
        sync: false
      - key: FAL_KEY
        sync: false

      # — HeyGen —
      - key: HEYGEN_API_KEY
        sync: false

      # — Pipeline watchdog —
      - key: PIPELINE_TIMEOUT_MS
        sync: false

      # — Remotion Lambda (Motion + MotionDesign cloud rendering) —
      # Active le rendu Remotion via AWS Lambda au lieu de Chromium local.
      # Avantages : 3-5× plus rapide sur les longues vidéos, scale infini.
      # Coût : ~$0.005-0.01 par vidéo de 30s avec 3009 MB / 240s timeout.
      #
      # Setup initial (à faire une fois) :
      #   1. Créer un IAM user avec les policies remotion (npx remotion lambda policies validate)
      #   2. Déployer la fonction : npx remotion lambda functions deploy --memory=3009 --timeout=240 --disk=2048
      #   3. Déployer le site Remotion : npx remotion lambda sites create apps/api/src/remotion/Root.tsx --site-name=clyro-motion
      #   4. Renseigner les 6 variables ci-dessous (USE_REMOTION_LAMBDA + AWS_* + REMOTION_LAMBDA_*)
      #
      # Si USE_REMOTION_LAMBDA n'est pas 'true' OU si une variable manque,
      # le pipeline retombe automatiquement sur le rendu Chromium local
      # (plus lent mais fonctionnel sans config AWS). Aucune obligation.
      - key: USE_REMOTION_LAMBDA
        sync: false       # 'true' pour activer Lambda, sinon laisser vide / 'false'
      - key: AWS_REGION
        sync: false       # ex: eu-west-3
      - key: AWS_ACCESS_KEY_ID
        sync: false       # IAM user avec accès Lambda + S3
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: REMOTION_LAMBDA_FUNCTION_NAME
        sync: false       # ex: remotion-render-4-0-448-mem3009mb-disk2048mb-240sec
      - key: REMOTION_LAMBDA_SERVE_URL
        sync: false       # ex: https://xxxxx.s3.eu-west-3.amazonaws.com/sites/clyro-motion/index.html
