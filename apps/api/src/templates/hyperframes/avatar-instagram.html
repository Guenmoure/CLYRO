<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CLYRO Avatar Instagram</title>
  <!--
    Instagram-style frame — avatar inside a fake Instagram post UI, with
    profile header (handle + verified check), like/comment/share footer,
    and a caption with hashtag styling. Maps to "social media native" feel.

    Variables :
      __AVATAR_SRC__ __DURATION__ __WIDTH__ __HEIGHT__
      __BRAND_COLOR__ __BRAND_COLOR_DARK__
      __LOWER_THIRD_TITLE__ __LOWER_THIRD_SUB__ __CAPTION_TEXT__
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
      font-family: 'Liberation Sans', system-ui, sans-serif; }

    [data-composition-id] {
      position: relative;
      width: __WIDTH__px;
      height: __HEIGHT__px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 50%, #232529 0%, #0e0f12 100%);
    }

    /* Subtle "phone bezel" shadow framing the post */
    .frame-shadow {
      position: absolute; inset: 0;
      box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.6);
      z-index: 1;
      pointer-events: none;
    }

    /* The Instagram-style post card */
    .ig-post {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 80%;
      max-width: 720px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      z-index: 2;
      opacity: 0;
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .ig-header {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 12px;
      border-bottom: 1px solid #efefef;
    }

    .ig-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, __BRAND_COLOR__ 0%, __BRAND_COLOR_DARK__ 100%);
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .ig-handle {
      flex: 1;
      display: flex; flex-direction: column;
    }

    .ig-handle-name {
      display: flex; align-items: center; gap: 6px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }

    /* Verified blue checkmark */
    .ig-verified {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #1d9bf0;
      display: inline-flex; align-items: center; justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 900;
    }
    .ig-verified::before { content: '\2713'; }

    .ig-handle-sub {
      font-size: 13px;
      color: #888;
      margin-top: 1px;
    }

    .ig-more {
      font-size: 22px;
      color: #1a1a1a;
      letter-spacing: 0.05em;
      cursor: default;
      user-select: none;
    }

    /* Avatar video — square aspect like Instagram feed */
    .ig-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      position: relative;
    }

    .ig-media video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Footer with action bar + caption */
    .ig-footer {
      padding: 12px 18px 16px;
    }

    .ig-actions {
      display: flex; align-items: center; gap: 14px;
      font-size: 26px;
      color: #1a1a1a;
      letter-spacing: 0.06em;
    }

    .ig-action {
      display: inline-block;
    }

    .ig-likes {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .ig-caption {
      margin-top: 6px;
      font-size: 14px;
      color: #1a1a1a;
      line-height: 1.45;
    }

    .ig-caption strong {
      font-weight: 700;
      margin-right: 4px;
    }

    .ig-hashtag { color: __BRAND_COLOR__; font-weight: 600; }

    /* Vertical 9:16 — bigger post taking most of the screen */
    @media (max-aspect-ratio: 1/1) {
      .ig-post { width: 92%; max-width: none; }
      .ig-header { padding: 18px 22px; }
      .ig-handle-name { font-size: 22px; }
      .ig-handle-sub { font-size: 16px; }
      .ig-avatar { width: 56px; height: 56px; font-size: 22px; }
      .ig-actions { font-size: 32px; gap: 18px; }
      .ig-likes { font-size: 18px; }
      .ig-caption { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div id="root"
       data-composition-id="avatar-instagram"
       data-start="0"
       data-width="__WIDTH__"
       data-height="__HEIGHT__"
       data-duration="__DURATION__">

    <div class="frame-shadow clip"
         data-start="0"
         data-duration="__DURATION__"
         data-track-index="0"></div>

    <div class="ig-post clip"
         id="post"
         data-start="0"
         data-duration="__DURATION__"
         data-track-index="1">

      <div class="ig-header">
        <div class="ig-avatar" id="igAvatar">__INITIAL__</div>
        <div class="ig-handle">
          <div class="ig-handle-name">
            <span>__LOWER_THIRD_TITLE__</span>
            <span class="ig-verified"></span>
          </div>
          <div class="ig-handle-sub">__LOWER_THIRD_SUB__ &middot; Sponsored</div>
        </div>
        <div class="ig-more">&#x22EF;</div>
      </div>

      <div class="ig-media">
        <video src="__AVATAR_SRC__" muted playsinline></video>
      </div>

      <div class="ig-footer">
        <div class="ig-actions">
          <span class="ig-action" id="likeBtn">&#x2661;</span>
          <span class="ig-action">&#128172;</span>
          <span class="ig-action">&#10148;</span>
        </div>
        <div class="ig-likes" id="likes">12 348 likes</div>
        <div class="ig-caption">
          <strong>__LOWER_THIRD_TITLE__</strong>__CAPTION_TEXT__
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    // Set the avatar initial to the first letter of __LOWER_THIRD_TITLE__
    // (server may have escaped the value, so we read from DOM via textContent
    // before initializing).
    const avatarEl = document.getElementById('igAvatar');
    const titleEl = document.querySelector('.ig-handle-name span');
    if (avatarEl && titleEl) {
      const t = (titleEl.textContent || 'C').trim();
      avatarEl.textContent = t.charAt(0).toUpperCase();
    }

    const tl = gsap.timeline({ paused: true });

    // Post slides up from below + scales in
    tl.to('#post', {
      opacity: 1,
      scale: 1,
      duration: 0.7,
      ease: 'back.out(1.4)',
    }, 0);

    // "Like" tap animation at t=1s — toggles to filled red heart
    tl.add(() => {
      const btn = document.getElementById('likeBtn');
      const likes = document.getElementById('likes');
      if (btn) {
        btn.innerHTML = '&#10084;';  // filled heart
        btn.style.color = '#ed4956';
      }
      if (likes) likes.textContent = '12 349 likes';
    }, 1.0);

    // Brief scale pulse on the heart at like time
    tl.fromTo('#likeBtn', { scale: 1 }, {
      scale: 1.4,
      duration: 0.18,
      ease: 'back.out(2)',
      yoyo: true,
      repeat: 1,
    }, 1.0);

    // Exit fade
    tl.to('#post', {
      opacity: 0,
      scale: 0.96,
      duration: 0.4,
      ease: 'power2.in',
    }, '__DURATION__' - 0.5);

    window.__timelines = window.__timelines || {};
    window.__timelines['avatar-instagram'] = tl;
  </script>
</body>
</html>
